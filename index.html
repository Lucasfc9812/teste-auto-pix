<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Seguro PIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(58, 123, 213, 0.2), transparent 400px),
                radial-gradient(circle at bottom left, rgba(0, 210, 255, 0.15), transparent 400px);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: all 0.4s ease;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 32px;
        }

        .value-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .value-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 16px 0;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .value-btn:hover {
            border-color: var(--primary);
            background: rgba(0, 210, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 210, 255, 0.3);
        }

        .value-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            box-shadow: 0 10px 20px -5px rgba(0, 210, 255, 0.4);
        }

        #pix-box {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .qrcode-container {
            background: white;
            padding: 16px;
            border-radius: 16px;
            display: inline-block;
            margin: 24px 0;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        #qrcode {
            width: 200px;
            height: 200px;
            display: block;
        }

        .pix-code-container {
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed var(--card-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .pixcode {
            word-break: break-all;
            color: var(--text-muted);
            font-size: 13px;
            font-family: monospace;
            user-select: all;
            margin-bottom: 12px;
        }

        .copy-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 210, 255, 0.4);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 400px) {
            .value-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <div class="header" id="header-section">
                <h1>Pagamento via PIX</h1>
                <p>Selecione o valor que deseja depositar</p>

                <div class="value-grid">
                    <button class="value-btn" onclick="gerarPix(10, this)">R$ 10</button>
                    <button class="value-btn" onclick="gerarPix(20, this)">R$ 20</button>
                    <button class="value-btn" onclick="gerarPix(30, this)">R$ 30</button>
                    <button class="value-btn" onclick="gerarPix(50, this)">R$ 50</button>
                    <button class="value-btn" onclick="gerarPix(100, this)">R$ 100</button>
                    <button class="value-btn" onclick="gerarPix(200, this)">R$ 200</button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 16px; color: var(--text-muted);">Gerando seu PIX...</p>
            </div>

            <div id="pix-box">
                <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 8px;" id="valor-display"></h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 16px;">Abra o app do seu banco e
                    escaneie o código abaixo:</p>

                <div class="qrcode-container">
                    <img id="qrcode" alt="QR Code PIX">
                </div>

                <div class="pix-code-container">
                    <p style="color: var(--text-main); font-weight: 500; font-size: 14px; margin-bottom: 8px;">Ou copie
                        o código Copia e Cola:</p>
                    <div class="pixcode" id="pixcode"></div>
                    <button class="copy-btn" onclick="copiarPix()" id="copy-btn-el">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        COPIAR CÓDIGO
                    </button>
                </div>

                <button class="value-btn" style="width: 100%; border: none;" onclick="voltar()">Voltar</button>
            </div>
        </div>
    </div>

    <script>
        let codigoPix = "";

        async function gerarPix(valor, btnElement) {
            // Atualizar UI de botoes
            document.querySelectorAll('.value-btn').forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');

            // Esconder menu e mostrar loading
            document.getElementById('header-section').style.display = 'none';
            document.getElementById('pix-box').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            document.getElementById("valor-display").innerText = "Pagamento de R$ " + valor.toFixed(2).replace('.', ',');

            try {
                const response = await fetch("http://localhost:4000/api/criar-pix", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ valor: valor })
                });

                if (!response.ok) {
                    throw new Error("Erro na comunicação com o servidor.");
                }

                const data = await response.json();
                console.log("Resposta da API:", data);

                const qr = data.qrcode || data.qrCode || data.qr_code || data.qrCodeImage || data.qr_code_base64;
                if (qr) {
                    if (qr.startsWith("data:image")) {
                        document.getElementById("qrcode").src = qr;
                    } else if (qr.startsWith("http")) { // caso venha uma URL de imagem
                        document.getElementById("qrcode").src = qr;
                    } else {
                        document.getElementById("qrcode").src = "data:image/png;base64," + qr;
                    }
                } else {
                    document.getElementById("qrcode").alt = "QR Code indisponível";
                }

                codigoPix = data.pix || data.pixCode || data.pixCopiaECola || data.payload || data.copyPaste;
                document.getElementById("pixcode").innerText = codigoPix || "Código PIX não encontrado na resposta";

                // Mostrar resultado
                document.getElementById('loading').style.display = 'none';
                document.getElementById('pix-box').style.display = 'block';

                // Reset copy button text
                const copyBtn = document.getElementById("copy-btn-el");
                copyBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    COPIAR CÓDIGO
                `;
                copyBtn.style.background = "";

            } catch (e) {
                console.error(e);
                alert("Erro ao gerar PIX. Tente novamente.");
                voltar();
            }
        }

        function copiarPix() {
            if (!codigoPix) {
                alert("Nenhum código PIX para copiar.");
                return;
            }

            navigator.clipboard.writeText(codigoPix).then(() => {
                const btn = document.getElementById("copy-btn-el");
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    COPIADO!
                `;
                btn.style.background = "#2ecc71";

                setTimeout(() => {
                    btn.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        COPIAR CÓDIGO
                    `;
                    btn.style.background = "";
                }, 3000);
            }).catch(err => {
                console.error('Falha ao copiar: ', err);
                alert("Não foi possível copiar o PIX automaticamente. Selecione e copie manualmente o texto acima.");
            });
        }

        function voltar() {
            document.getElementById('pix-box').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('header-section').style.display = 'block';
            document.querySelectorAll('.value-btn').forEach(btn => btn.classList.remove('active'));
        }
    </script>
</body>

</html>
