<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagamento PIX</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

.buttons{
display:grid;
grid-template-columns:repeat(5,90px);
gap:15px;
justify-content:center;
margin-bottom:30px;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:8px;
background:#16a085;
color:white;
cursor:pointer;
}

button:hover{
background:#13856b;
}

#pix-box{
display:none;
margin-top:30px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#qrcode{
width:220px;
margin-top:20px;
}

.pixcode{
margin-top:15px;
word-break:break-all;
font-size:14px;
background:#eee;
padding:10px;
border-radius:6px;
}

.copy{
margin-top:10px;
background:#3498db;
}

</style>

</head>

<body>

<h1>Escolha o valor para pagar</h1>

<div class="buttons">

<button onclick="gerarPix(5)">5</button> <button onclick="gerarPix(10)">10</button> <button onclick="gerarPix(15)">15</button> <button onclick="gerarPix(20)">20</button> <button onclick="gerarPix(25)">25</button>

<button onclick="gerarPix(30)">30</button> <button onclick="gerarPix(35)">35</button> <button onclick="gerarPix(40)">40</button> <button onclick="gerarPix(45)">45</button> <button onclick="gerarPix(50)">50</button>

</div>

<div id="pix-box">

<h2 id="valor"></h2>

<img id="qrcode">

<div class="pixcode" id="pixcode"></div>

<button class="copy" onclick="copiarPix()">Copiar código PIX</button>

</div>

<script>

let codigoPix = ""

async function gerarPix(valor){

document.getElementById("valor").innerText = "Pagamento de R$ " + valor

try{

const response = await fetch("/api/criar-pix",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
valor:valor
})

})

const data = await response.json()

console.log("Resposta da API:",data)

document.getElementById("pix-box").style.display="block"

const qr =
data.qrcode ||
data.qrCode ||
data.qr_code ||
data.qrCodeImage ||
data.qr_code_base64

if(qr){

if(qr.startsWith("data:image")){
document.getElementById("qrcode").src = qr
}else{
document.getElementById("qrcode").src = "data:image/png;base64," + qr
}

}

codigoPix =
data.pix ||
data.pixCode ||
data.pixCopiaECola ||
data.payload ||
data.copyPaste

document.getElementById("pixcode").innerText = codigoPix || "PIX não encontrado"

}catch(e){

alert("Erro ao gerar PIX")
console.error(e)

}

}

function copiarPix(){

navigator.clipboard.writeText(codigoPix)

alert("PIX copiado!")

}

</script>

</body>

</html>
